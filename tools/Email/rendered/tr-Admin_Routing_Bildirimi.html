<div style="margin:0 auto;max-width:720px;background:#f6f9fc;padding:24px;font-family:Arial,Helvetica,sans-serif;color:#172033;">
    <div style="background:#0f172a;color:#fff;border-radius:24px 24px 0 0;padding:28px;">
        <div style="font-size:12px;letter-spacing:.14em;text-transform:uppercase;opacity:.85;">{{badge}}</div>
        <h1 style="margin:10px 0 0;font-size:24px;line-height:1.25;">{{title}}</h1>
    </div>
    <div style="background:#fff;border-radius:0 0 24px 24px;padding:28px;border:1px solid #dbe5f1;border-top:0;">
        <p style="margin:0 0 18px;font-size:15px;line-height:1.65;color:#334155;">{{intro}}</p>
        <div style="border-radius:16px;background:#f8fafc;border:1px solid #e2e8f0;padding:18px;margin-bottom:18px;">
            {{detail_html}}
        </div>
        <p style="margin:0 0 14px;font-size:12px;color:#64748b;">Olay kodu: <strong>{{event_code}}</strong> Â· {{occurred_at}}</p>
        <a href="{{primary_url}}" style="display:inline-block;padding:12px 20px;border-radius:999px;background:#0b57d0;color:#fff;text-decoration:none;font-weight:700;font-size:14px;">{{primary_label}}</a>
    </div>
</div>
