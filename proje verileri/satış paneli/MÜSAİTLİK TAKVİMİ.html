<!DOCTYPE html>
<html lang="tr">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Müsaitlik Takvimi · Satış Paneli</title><link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet"><link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css"><style>:root{--primary:#1E3A8A;--secondary:#F59E0B;--success:#10B981;--error:#EF4444;--bg-light:#F3F4F6;--card-bg:#FFFFFF;--border-light:#E5E7EB;--sidebar-width:260px}*{margin:0;padding:0}body{font-family:"Inter",sans-serif;background:var(--bg-light)}.dashboard{display:flex}.sidebar{width:var(--sidebar-width);background:#0F172A;color:#fff;position:fixed;height:100vh}.sidebar-header{padding:24px 20px}.logo{font-size:22px}.sidebar-nav{padding:20px 12px}.nav-item{display:flex;align-items:center;gap:12px;padding:12px 16px;color:rgba(255,255,255,0.7);text-decoration:none}.nav-item.active{background:var(--secondary);color:#fff}.main-content{flex:1;margin-left:var(--sidebar-width);padding:24px 32px}.filter-bar{display:flex;gap:16px;margin-bottom:24px;flex-wrap:wrap}.filter-select{padding:12px 16px;border:1px solid var(--border-light);border-radius:12px;background:var(--card-bg)}.calendar-grid{display:grid;grid-template-columns:repeat(7,1fr);gap:8px;background:var(--card-bg);border-radius:16px;padding:20px}.calendar-header{text-align:center;font-weight:600;padding:12px}.calendar-cell{aspect-ratio:1;display:flex;flex-direction:column;align-items:center;justify-content:center;border-radius:12px;border:1px solid var(--border-light);cursor:pointer}.calendar-cell.available{background:rgba(16,185,129,0.1);border-color:var(--success)}.calendar-cell.booked{background:rgba(239,68,68,0.1);border-color:var(--error)}.price{font-size:11px;font-weight:600;color:var(--secondary)}@media (max-width:900px){.sidebar{display:none}.main-content{margin-left:0;padding:20px}}</style>
</head>
<body><div class="dashboard"><aside class="sidebar"><div class="sidebar-header"><div class="logo">Otelturizm SATIŞ</div></div><nav class="sidebar-nav"><a href="#" class="nav-item"><i class="fas fa-chart-pie"></i> Dashboard</a><a href="#" class="nav-item active"><i class="fas fa-calendar-alt"></i> Müsaitlik Takvimi</a></nav></aside><main class="main-content"><h1 style="margin-bottom:24px">Müsaitlik Takvimi</h1><div class="filter-bar"><select class="filter-select"><option>Swissôtel The Bosphorus</option><option>Rixos Premium Belek</option></select><select class="filter-select"><option>Deluxe Oda</option><option>Standart Oda</option></select><select class="filter-select"><option>Nisan 2025</option></select><button class="btn" style="background:var(--secondary);color:#fff;padding:12px 24px;border:none;border-radius:12px;"><i class="fas fa-search"></i> Sorgula</button></div><div class="calendar-grid"><div class="calendar-header">Pzt</div><div class="calendar-header">Sal</div><div class="calendar-header">Çar</div><div class="calendar-header">Per</div><div class="calendar-header">Cum</div><div class="calendar-header">Cmt</div><div class="calendar-header">Paz</div>
<div class="calendar-cell"></div><div class="calendar-cell"></div><div class="calendar-cell"></div><div class="calendar-cell"></div><div class="calendar-cell"></div><div class="calendar-cell"></div><div class="calendar-cell">1</div>
<div class="calendar-cell">2</div><div class="calendar-cell available">3<span class="price">₺4.250</span></div><div class="calendar-cell booked">4</div><div class="calendar-cell booked">5</div><div class="calendar-cell available">6<span class="price">₺4.250</span></div><div class="calendar-cell available">7<span class="price">₺4.250</span></div><div class="calendar-cell available">8</div>
<div class="calendar-cell available">9</div><div class="calendar-cell available">10</div><div class="calendar-cell booked">11</div><div class="calendar-cell booked">12</div><div class="calendar-cell available">13<span class="price">₺4.250</span></div><div class="calendar-cell available">14</div><div class="calendar-cell">15</div>
</div><p style="margin-top:16px"><span style="display:inline-block;width:12px;height:12px;background:var(--success);border-radius:4px;"></span> Müsait <span style="display:inline-block;width:12px;height:12px;background:var(--error);border-radius:4px;margin-left:16px;"></span> Dolu</p></main></div></body>
</html>
